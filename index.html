<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>USCP Advanced Practice Test</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f5f7;
      color: #111;
    }
    .wrap {
      max-width: 980px;
      margin: 28px auto;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
      padding: 24px;
    }
    h1 {
      margin: 0 0 12px 0;
      font-size: 28px;
    }
    .meta, .progress, .score {
      color: #444;
      margin-bottom: 10px;
    }
    .question {
      font-size: 20px;
      margin: 18px 0;
      line-height: 1.45;
    }
    .choice {
      display: block;
      border: 1px solid #d3d8de;
      background: #fafbfc;
      border-radius: 10px;
      padding: 12px;
      margin: 10px 0;
      cursor: pointer;
    }
    .choice:hover {
      background: #eef3f8;
    }
    .choice input {
      margin-right: 10px;
    }
    .btns {
      display: flex;
      gap: 10px;
      margin-top: 18px;
      flex-wrap: wrap;
    }
    button {
      background: #0b57d0;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 11px 16px;
      font-size: 15px;
      cursor: pointer;
    }
    button:disabled {
      background: #9aa0a6;
      cursor: not-allowed;
    }
    .feedback {
      display: none;
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
    }
    .correct {
      background: #e6f4ea;
      border: 1px solid #a7d7b5;
    }
    .incorrect {
      background: #fde8e8;
      border: 1px solid #efb6b6;
    }
    .summary {
      display: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>USCP Advanced Practice Test</h1>
    <div class="meta">50 questions • harder scenarios • instant feedback</div>

    <div id="quiz">
      <div class="progress" id="progress"></div>
      <div class="score" id="scoreLine"></div>
      <div class="question" id="question"></div>
      <form id="choicesForm"></form>
      <div class="btns">
        <button type="button" id="checkBtn">Check Answer</button>
        <button type="button" id="nextBtn" disabled>Next Question</button>
      </div>
      <div class="feedback" id="feedback"></div>
    </div>

    <div class="summary" id="summary">
      <h2>Test Complete</h2>
      <p id="finalScore"></p>
      <p id="finalPercent"></p>
      <button type="button" id="restartBtn">Restart Test</button>
    </div>
  </div>

  <script>

          B: "Using memory of prior shifts as the sole reference point",
          C: "Systematically checking the surroundings to determine what should and should not be present",
          D: "Focusing on unattended bags while assuming fixed objects are not relevant"
        },
        answer: "C",
        explanation: "Environmental baseline means checking the geographical surroundings for things that should or should not be present, including hidden devices or unattended items."
      },
      {
        q: "A package is too large to fit through the x-ray machine. What should happen next?",
        choices: {
          A: "It is denied entry unless a supervisor personally authorizes admission",
          B: "It should be physically inspected to detect weapons, explosives, or other prohibited items",
          C: "It bypasses screening if the person carrying it appears cooperative",
          D: "It must be stored outside until a mobile x-ray unit arrives"
        },
        answer: "B",
        explanation: "If a package cannot be x-rayed or no machine is available, the screener physically inspects it."
      },
      {
        q: "When the large green lockdown button on the podium is activated, which result is part of the response?",
        choices: {
          A: "Only the x-ray machine powers down",
          B: "All doors unlock and a fire alarm sequence begins",
          C: "Maglocks activate, a direct line opens to Communications, and post cameras are highlighted for the Watch Commander",
          D: "Nothing happens until a supervisor approves the lock-down over the radio"
        },
        answer: "C",
        explanation: "The notes identify maglock activation, direct Stentofone line to Communications, and camera attention for the Watch Commander."
      },
      {
        q: "During an after-hours building check, you find an unsecured congressional office that is unoccupied and cannot be secured. Which document should capture that observation and your action?",
        choices: {
          A: "CP-50",
          B: "PD-252",
          C: "CP-542",
          D: "CP-103A"
        },
        answer: "A",
        explanation: "CP-50 is used during building checks to document unsecured congressional offices, observations, and action taken."
      },
      {
        q: "What are officers specifically expected to do with door handles during building checks?",
        choices: {
          A: "Observe them visually without contact unless there is obvious damage",
          B: "Photograph them only if the office appears unsecured",
          C: "Physically shake all door handles",
          D: "Leave them untouched so fingerprints are not disturbed"
        },
        answer: "C",
        explanation: "The notes specifically say officers should physically shake all door handles during building checks."
      },
      {
        q: "At the start of a WTM assignment, which check is required?",
        choices: {
          A: "Ensure the WTM is powered, alarms when metal passes through, and zone lights function",
          B: "Reposition the WTM if the line appears uneven and then test alarm sound only",
          C: "Wait for the first screening alarm to verify function naturally",
          D: "Confirm that the WTM is powered; zone-light testing is optional"
        },
        answer: "A",
        explanation: "The notes require verifying power, alarm function, and operational zone lights before beginning the shift."
      },
      {
        q: "A current Member of Congress escorts three non-exempt visitors to an access point and insists they all bypass screening. What is the best response under your notes?",
        choices: {
          A: "Refuse entry to all four until the visitors submit to screening",
          B: "Allow entry without documenting it because the Member is exempt",
          C: "Firmly and courteously explain the screening requirement, allow entry if the Member insists, record the Member’s name, number of guests, and time on a CP-60, and notify a supervisor",
          D: "Allow only the Member to enter and direct the visitors to a different building entrance"
        },
        answer: "C",
        explanation: "That is the exact procedure described when a Member insists on escorting non-exempt individuals past screening."
      }
    ];

    let current = 0;
    let score = 0;
    let answered = false;

    const progressEl = document.getElementById("progress");
    const scoreLineEl = document.getElementById("scoreLine");
    const questionEl = document.getElementById("question");
    const choicesForm = document.getElementById("choicesForm");
    const feedbackEl = document.getElementById("feedback");
    const checkBtn = document.getElementById("checkBtn");
    const nextBtn = document.getElementById("nextBtn");
    const quizEl = document.getElementById("quiz");
    const summaryEl = document.getElementById("summary");
    const finalScoreEl = document.getElementById("finalScore");
    const finalPercentEl = document.getElementById("finalPercent");
    const restartBtn = document.getElementById("restartBtn");

    function renderQuestion() {
      answered = false;
      feedbackEl.style.display = "none";
      feedbackEl.className = "feedback";
      checkBtn.disabled = false;
      nextBtn.disabled = true;

      const q = questions[current];
      progressEl.textContent = `Question ${current + 1} of ${questions.length}`;
      scoreLineEl.textContent = `Score: ${score} / ${questions.length}`;
      questionEl.textContent = q.q;

      choicesForm.innerHTML = "";
      Object.entries(q.choices).forEach(([letter, text]) => {
        const label = document.createElement("label");
        label.className = "choice";
        label.innerHTML = `
          <input type="radio" name="answer" value="${letter}">
          <strong>${letter}.</strong> ${text}
        `;
        choicesForm.appendChild(label);
      });
    }

    function checkAnswer() {
      if (answered) return;

      const selected = document.querySelector('input[name="answer"]:checked');
      if (!selected) {
        feedbackEl.style.display = "block";
        feedbackEl.className = "feedback incorrect";
        feedbackEl.innerHTML = "<strong>Select an answer first.</strong>";
        return;
      }

      const q = questions[current];
      const correct = selected.value === q.answer;

      if (correct) {
        score++;
      }

      answered = true;
      checkBtn.disabled = true;
      nextBtn.disabled = false;

      feedbackEl.style.display = "block";
      feedbackEl.className = "feedback " + (correct ? "correct" : "incorrect");
      feedbackEl.innerHTML = `
        <strong>${correct ? "Correct." : "Incorrect."}</strong>
        The correct answer is <strong>${q.answer}</strong>.<br><br>
        ${q.explanation}
      `;

      scoreLineEl.textContent = `Score: ${score} / ${questions.length}`;
    }

    function nextQuestion() {
      if (current < questions.length - 1) {
        current++;
        renderQuestion();
      } else {
        showSummary();
      }
    }

    function showSummary() {
      quizEl.style.display = "none";
      summaryEl.style.display = "block";
      const percent = ((score / questions.length) * 100).toFixed(1);
      finalScoreEl.textContent = `Final Score: ${score} / ${questions.length}`;
      finalPercentEl.textContent = `Percentage: ${percent}%`;
    }

    function restartTest() {
      current = 0;
      score = 0;
      quizEl.style.display = "block";
      summaryEl.style.display = "none";
      renderQuestion();
    }

    checkBtn.addEventListener("click", checkAnswer);
    nextBtn.addEventListener("click", nextQuestion);
    restartBtn.addEventListener("click", restartTest);

    renderQuestion();
  </script>
</body>
</html>
